{{- if and .Values.secret.enabled (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
  {{- with .Values.secret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- if .Values.secret.gatewayToken }}
  OPENCLAW_GATEWAY_TOKEN: {{ .Values.secret.gatewayToken | b64enc | quote }}
  {{- else }}
  OPENCLAW_GATEWAY_TOKEN: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if .Values.secret.apiKeys.anthropic }}
  ANTHROPIC_API_KEY: {{ .Values.secret.apiKeys.anthropic | b64enc | quote }}
  {{- end }}
  {{- if .Values.secret.apiKeys.openai }}
  OPENAI_API_KEY: {{ .Values.secret.apiKeys.openai | b64enc | quote }}
  {{- end }}
  {{- if .Values.secret.apiKeys.gemini }}
  GEMINI_API_KEY: {{ .Values.secret.apiKeys.gemini | b64enc | quote }}
  {{- end }}
  {{- if .Values.secret.apiKeys.openrouter }}
  OPENROUTER_API_KEY: {{ .Values.secret.apiKeys.openrouter | b64enc | quote }}
  {{- end }}
  {{- if .Values.secret.telegramBotToken }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secret.telegramBotToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.secret.ghToken }}
  GH_TOKEN: {{ .Values.secret.ghToken | b64enc | quote }}
  {{- end }}
{{- end }}