apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openclaw.fullname" . }}-config
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
data:
  openclaw.json: |
    {{ .Values.config | toJson }}
{{- $root := . }}
{{- range $path, $bytes := .Files.Glob "files/*.md" }}
{{- $name := base $path }}
  {{ $name }}: |
{{- $root.Files.Get $path | nindent 4 }}
{{- end }}
{{- if gt (len (.Files.Glob "files/ops/AGENTS.md")) 0 }}
  OPS_AGENTS.md: |
{{- $root.Files.Get "files/ops/AGENTS.md" | nindent 4 }}
{{- end }}
{{- if gt (len (.Files.Glob "files/ops/SOUL.md")) 0 }}
  OPS_SOUL.md: |
{{- $root.Files.Get "files/ops/SOUL.md" | nindent 4 }}
{{- end }}
{{- if gt (len (.Files.Glob "files/ops/IDENTITY.md")) 0 }}
  OPS_IDENTITY.md: |
{{- $root.Files.Get "files/ops/IDENTITY.md" | nindent 4 }}
{{- end }}
{{- if gt (len (.Files.Glob "files/ops/RUNBOOK.md")) 0 }}
  OPS_RUNBOOK.md: |
{{- $root.Files.Get "files/ops/RUNBOOK.md" | nindent 4 }}
{{- end }}
{{- if not (.Files.Glob "files/*.md") }}
  AGENTS.md: |
    # OpenClaw Assistant

    You are a helpful AI assistant running in Kubernetes.
{{- end }}